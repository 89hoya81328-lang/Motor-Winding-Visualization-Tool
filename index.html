<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="고정자 결선도(Stator Winding Diagram) 계산 및 시각화 도구">
  <title>고정자 결선도 분석기 | Stator Winding Analyzer</title>

  <!-- ============================================================
    [스타일 영역]
    앱의 전체적인 디자인을 담당합니다.
    다크 모드 기반의 프리미엄 UI를 구현합니다.
  ============================================================ -->
  <style>
    /* --- 1. CSS 변수 (디자인 토큰) --- */
    :root {
      --bg-primary: #0f1923;
      --bg-secondary: #1a2736;
      --bg-card: #1e3045;
      --bg-card-hover: #243a52;
      --text-primary: #e8edf2;
      --text-secondary: #8a9bb5;
      --text-muted: #5a6f8a;
      --accent-cyan: #00d4ff;
      --accent-cyan-dim: rgba(0,212,255,0.15);
      --phase-u: #ff4d6a;
      --phase-u-bg: rgba(255,77,106,0.12);
      --phase-v: #3b82f6;
      --phase-v-bg: rgba(59,130,246,0.12);
      --phase-w: #22c55e;
      --phase-w-bg: rgba(34,197,94,0.12);
      --border-color: rgba(255,255,255,0.06);
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0,0,0,0.3);
      --font: 'Segoe UI', -apple-system, sans-serif;
    }

    /* --- 2. 기본 리셋 및 바디 --- */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* --- 3. 헤더 --- */
    .header {
      text-align: center;
      padding: 48px 20px 32px;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-cyan), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .header p { color: var(--text-secondary); font-size: 0.95rem; }

    /* --- 4. 컨테이너 --- */
    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

    /* --- 5. 카드 공통 스타일 --- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }
    .card-title {
      padding: 16px 24px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-cyan);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; gap: 8px;
    }
    .card-title .icon { font-size: 1.1rem; }

    /* --- 6. 사양 테이블 --- */
    .spec-table { width: 100%; border-collapse: collapse; }
    .spec-table th, .spec-table td {
      padding: 14px 24px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }
    .spec-table th {
      color: var(--text-secondary);
      font-weight: 500; width: 40%;
      background: rgba(0,0,0,0.15);
    }
    .spec-table td { font-weight: 600; }
    .spec-table tr:last-child th,
    .spec-table tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-cyan { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
    .badge-u { background: var(--phase-u-bg); color: var(--phase-u); }
    .badge-v { background: var(--phase-v-bg); color: var(--phase-v); }
    .badge-w { background: var(--phase-w-bg); color: var(--phase-w); }

    /* --- 7. 버튼 --- */
    .btn-wrap { text-align: center; margin: 32px 0; }
    .btn {
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      color: #fff;
      border: none;
      padding: 14px 48px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,180,216,0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(0,180,216,0.4);
    }
    
    /* --- 8. 입력 폼 (Phase 7 추가) --- */
    .input-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
    }
    .input-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .input-label {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    .input-field {
      width: 140px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-family: var(--font);
      transition: border-color 0.3s;
    }
    .input-field:focus {
      outline: none;
      border-color: #00b4d8;
    }
    .input-field option {
      background: var(--bg-card);
    }
      box-shadow: 0 8px 30px rgba(0,180,216,0.45);
    }
    .btn:active { transform: translateY(0); }

    /* --- 8. 결과 테이블 --- */
    .result-table { width: 100%; border-collapse: collapse; }
    .result-table th, .result-table td {
      padding: 14px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9rem;
    }
    .result-table thead th {
      font-weight: 700;
      font-size: 0.95rem;
      background: rgba(0,0,0,0.2);
    }
    .result-table th.phase-u-head { color: var(--phase-u); }
    .result-table th.phase-v-head { color: var(--phase-v); }
    .result-table th.phase-w-head { color: var(--phase-w); }
    .result-table tbody tr:hover { background: var(--bg-card-hover); }
    .result-table tr:last-child td { border-bottom: none; }
    .slot-pair {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      min-width: 70px;
    }
    .slot-u { background: var(--phase-u-bg); color: var(--phase-u); }
    .slot-v { background: var(--phase-v-bg); color: var(--phase-v); }
    .slot-w { background: var(--phase-w-bg); color: var(--phase-w); }

    /* --- 9. 요약 카드 --- */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 20px;
    }
    .summary-item {
      text-align: center;
      padding: 20px 12px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
    }
    .summary-item.u { background: var(--phase-u-bg); border-color: rgba(255,77,106,0.2); }
    .summary-item.v { background: var(--phase-v-bg); border-color: rgba(59,130,246,0.2); }
    .summary-item.w { background: var(--phase-w-bg); border-color: rgba(34,197,94,0.2); }
    .summary-item .label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    .summary-item .value { font-size: 1.5rem; font-weight: 800; }
    .summary-item.u .value { color: var(--phase-u); }
    .summary-item.v .value { color: var(--phase-v); }
    .summary-item.w .value { color: var(--phase-w); }
    .summary-item .sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

    /* --- 10. 애니메이션 --- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hidden { display: none; }

    /* --- 11. SVG 다이어그램 스타일 --- */
    .svg-wrap {
      display: flex;
      justify-content: center;
      padding: 24px;
      overflow-x: auto;
    }
    #statorSvg {
      max-width: 100%;
      height: auto;
    }
    /* 스태터 외곽 원 */
    .stator-body {
      fill: none;
      stroke: #3a5068;
      stroke-width: 18;
    }
    /* 내부 보어 원 */
    .stator-bore {
      fill: var(--bg-primary);
      stroke: #2a3e52;
      stroke-width: 2;
    }
    /* 슬롯 사각형 기본 스타일 (아직 미착색 = 회색) */
    .slot-rect {
      fill: #4a6274;
      stroke: #5e7b91;
      stroke-width: 1;
      cursor: pointer;
      transition: fill 0.3s ease, filter 0.3s ease;
    }
    .slot-rect:hover {
      filter: brightness(1.4);
    }
    /* 슬롯 번호 텍스트 */
    .slot-label {
      fill: var(--text-primary);
      font-size: 11px;
      font-family: var(--font);
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    /* SVG 범례(Legend) */
    .legend-wrap {
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 12px 20px 20px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }
    /* --- Phase 3: 코일 배선 스타일 (개선) --- */
    .wire-u { stroke: #FF3333; stroke-width: 2.5; fill: none; }
    .wire-v { stroke: #4488FF; stroke-width: 2.5; fill: none; }
    .wire-w { stroke: #33DD55; stroke-width: 2.5; fill: none; }
    .coil-arc { stroke-linecap: round; }
    .wire-connect { stroke-width: 1.2; fill: none; opacity: 0.55; stroke-linecap: round; }
    .jumper-wire { stroke-width: 1.8; fill: none; opacity: 0.7; stroke-linecap: round; stroke-dasharray: 10 4; }
    .terminal-node { stroke-width: 2.5; cursor: pointer; }
    .terminal-label { font-size: 15px; font-weight: 800; text-anchor: middle; dominant-baseline: central; }
    .delta-line { stroke-width: 2; fill: none; }
    /* 권선 방향 표식: ⊙(진출 = Go), ⊗(진입 = Return) */
    .winding-marker {
      font-size: 14px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    @keyframes strokeDraw {
      from { stroke-dashoffset: var(--dash-len); }
      to { stroke-dashoffset: 0; }
    }
    .animated-wire { animation: strokeDraw 1s ease forwards; }

    /* --- 12. 반응형 --- */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.5rem; }
      .summary-grid { grid-template-columns: 1fr; }
      .spec-table th, .spec-table td { padding: 10px 14px; font-size: 0.82rem; }
      .result-table th, .result-table td { padding: 10px 8px; font-size: 0.8rem; }
      .legend-wrap { gap: 12px; flex-wrap: wrap; }
    }

    /* --- 13. 푸터 --- */
    .footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.75rem;
      border-top: 1px solid var(--border-color);
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <!-- ============================================================
    [헤더 영역]
    앱의 제목과 부제목을 표시합니다.
  ============================================================ -->
  <header class="header">
    <h1>⚡ 고정자 결선도 분석기</h1>
    <p>Stator Winding Diagram Analyzer — Phase 3: Coil Winding & Delta</p>
  </header>

  <main class="container">

    <!-- ============================================================
      [사양 설정 카드]
      사용자가 극 수, 슬롯 수, 결선 방식을 입력하는 폼입니다.
    ============================================================ -->
    <section class="card" id="specCard">
      <div class="card-title"><span class="icon">📋</span> 모터 사양 입력 (Motor Specifications)</div>
      <div class="input-form">
        <div class="input-group">
          <label class="input-label" for="inputPoles">극 수 (Poles, P)</label>
          <input class="input-field" type="number" id="inputPoles" value="42" min="2" step="2">
        </div>
        <div class="input-group">
          <label class="input-label" for="inputSlots">슬롯 수 (Slots, S)</label>
          <input class="input-field" type="number" id="inputSlots" value="36" min="3" step="3">
        </div>
        <div class="input-group">
          <label class="input-label" for="inputConn">결선 방식 (Connection)</label>
          <select class="input-field" id="inputConn">
            <option value="Delta" selected>델타(Δ) 결선</option>
            <option value="Y">와이(Y) 결선</option>
          </select>
        </div>
      </div>
    </section>

    <!-- ============================================================
      [버튼 영역]
      사용자가 이 버튼을 클릭하면 generateDesign() 함수가 실행되어
      결선 데이터를 계산하거나 도면을 새로 그립니다.
    ============================================================ -->
    <div class="btn-wrap">
      <button class="btn" id="generateBtn" onclick="generateDesign()">
        ⚙️ 설계 생성 (Generate Design)
      </button>
    </div>

    <!-- ============================================================
      [결과 영역]
      처음에는 숨겨져 있다가, 버튼 클릭 후 표시됩니다.
      1) 요약 카드 — 각 상(Phase)별 슬롯 개수
      2) 상세 테이블 — 각 코일 그룹별 슬롯 번호
      3) 전체 배치 테이블 — 슬롯 1~36 각각의 상 배정
    ============================================================ -->
    <div id="resultArea" class="hidden"></div>

    <!-- ============================================================
      [SVG 다이어그램 영역]
      버튼 클릭 시 drawStator() 함수가 이 카드 안에
      슬롯이 배치된 스태터 원형 도면을 그려줍니다.
    ============================================================ -->
    <div id="diagramArea" class="hidden"></div>

    <!-- ============================================================
      [델타 결선 도식 영역]
      정삼각형 형태의 델타(Δ) 회로 도식을 표시합니다.
    ============================================================ -->
    <div id="deltaSchematicArea" class="hidden"></div>

  </main>

  <footer class="footer">Phase 7 — Dynamic UI & P/S Generator | 고정자 결선도 프로젝트</footer>

  <!-- ============================================================
    [자바스크립트 영역]
    앱의 '두뇌' 역할을 하는 계산 로직입니다.
  ============================================================ -->
  <script>
    /**
     * =====================================================
     * generateDesign()
     * =====================================================
     * 사용자가 입력한 P, S, Connection 값에 따라 동적으로 UI와 도면을 업데이트합니다.
     */
    function generateDesign() {
      // --- [1단계] 사용자 입력값 가져오기 ---
      const poles = parseInt(document.getElementById('inputPoles').value) || 42;
      const slots = parseInt(document.getElementById('inputSlots').value) || 36;
      const conn = document.getElementById('inputConn').value;
      const phases = 3;

      const resultArea = document.getElementById('resultArea');
      const deltaArea = document.getElementById('deltaSchematicArea');
      const diagramArea = document.getElementById('diagramArea');

      // 기존 상태 초기화 (도면 숨기기 등)
      diagramArea.classList.add('hidden');
      if (deltaArea) deltaArea.classList.add('hidden');
      
      // 42P 36S 델타결선일 경우에만 완벽한 권선 알고리즘 실행 (기존 로직)
      if (poles === 42 && slots === 36 && conn === 'Delta') {
        const slotsPerCoil = 2;
        const phaseNames = ['U', 'V', 'W'];
        const coilGroupsPerPhase = slots / phases / slotsPerCoil;
        const groupSpacing = phases * slotsPerCoil;

        const phaseSlots = { U: [], V: [], W: [] };
        for (let p = 0; p < phases; p++) {
          const phaseName = phaseNames[p];
          const startSlot = (p * slotsPerCoil) + 1;
          for (let g = 0; g < coilGroupsPerPhase; g++) {
            const slot1 = startSlot + (g * groupSpacing);
            const slot2 = slot1 + 1;
            phaseSlots[phaseName].push([slot1, slot2]);
          }
        }

        const slotMap = {};
        for (const phase in phaseSlots) {
          phaseSlots[phase].forEach(pair => {
            pair.forEach(slot => { slotMap[slot] = phase; });
          });
        }

        resultArea.innerHTML = buildResultHTML(phaseSlots, slotMap, slots, coilGroupsPerPhase);
        resultArea.classList.remove('hidden');

        drawStator(slots, slotMap, phaseSlots, poles);
        diagramArea.classList.remove('hidden');
        
        drawDeltaSchematic(phaseSlots);
        if(deltaArea) deltaArea.classList.remove('hidden');

        resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        // --- 임시 로직: 범용 권선 알고리즘이 없으므로, 슬롯 도면만 동적으로 렌더링 ---
        resultArea.classList.add('hidden'); // 결과 표 숨김
        drawStator(slots, {}, { U: [], V: [], W: [] }, poles);
        diagramArea.classList.remove('hidden');
        diagramArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }



    /**
     * =====================================================
     * buildResultHTML()
     * =====================================================
     * 계산된 데이터를 기반으로 결과 HTML을 조립합니다.
     * 3개의 섹션으로 구성됩니다:
     *   1) 요약 카드 - 각 상별 슬롯 개수
     *   2) 상세 테이블 - 코일 그룹별 슬롯 쌍
     *   3) 전체 슬롯 배치 테이블 - 1~36번 슬롯 맵
     */
    function buildResultHTML(phaseSlots, slotMap, totalSlots, groupCount) {
      let html = '';

      // ---- 섹션 1: 요약 카드 ----
      html += `
        <section class="card" style="animation-delay:0.1s">
          <div class="card-title"><span class="icon">📊</span> 상별 요약 (Phase Summary)</div>
          <div class="summary-grid">
            <div class="summary-item u">
              <div class="label">Phase U</div>
              <div class="value">${phaseSlots['U'].length * 2}</div>
              <div class="sub">슬롯 (${phaseSlots['U'].length}코일)</div>
            </div>
            <div class="summary-item v">
              <div class="label">Phase V</div>
              <div class="value">${phaseSlots['V'].length * 2}</div>
              <div class="sub">슬롯 (${phaseSlots['V'].length}코일)</div>
            </div>
            <div class="summary-item w">
              <div class="label">Phase W</div>
              <div class="value">${phaseSlots['W'].length * 2}</div>
              <div class="sub">슬롯 (${phaseSlots['W'].length}코일)</div>
            </div>
          </div>
        </section>`;

      // ---- 섹션 2: 상세 코일 그룹 테이블 ----
      html += `
        <section class="card" style="animation-delay:0.2s">
          <div class="card-title"><span class="icon">🔌</span> 코일 그룹 상세 (Coil Group Detail)</div>
          <table class="result-table">
            <thead>
              <tr>
                <th>코일 그룹</th>
                <th class="phase-u-head">Phase U</th>
                <th class="phase-v-head">Phase V</th>
                <th class="phase-w-head">Phase W</th>
              </tr>
            </thead>
            <tbody>`;

      for (let i = 0; i < groupCount; i++) {
        const uPair = phaseSlots['U'][i];
        const vPair = phaseSlots['V'][i];
        const wPair = phaseSlots['W'][i];
        html += `
              <tr>
                <td style="color:var(--text-secondary)">#${i + 1}</td>
                <td><span class="slot-pair slot-u">${uPair[0]}-${uPair[1]}</span></td>
                <td><span class="slot-pair slot-v">${vPair[0]}-${vPair[1]}</span></td>
                <td><span class="slot-pair slot-w">${wPair[0]}-${wPair[1]}</span></td>
              </tr>`;
      }

      // 하단 요약 행
      html += `
              <tr style="background:rgba(0,0,0,0.15)">
                <td style="font-weight:700;color:var(--text-secondary)">전체</td>
                <td style="font-weight:700;color:var(--phase-u)">${phaseSlots['U'].map(p => p.join('-')).join(', ')}</td>
                <td style="font-weight:700;color:var(--phase-v)">${phaseSlots['V'].map(p => p.join('-')).join(', ')}</td>
                <td style="font-weight:700;color:var(--phase-w)">${phaseSlots['W'].map(p => p.join('-')).join(', ')}</td>
              </tr>
            </tbody>
          </table>
        </section>`;

      // ---- 섹션 3: 전체 슬롯 배치 맵 ----
      html += `
        <section class="card" style="animation-delay:0.3s">
          <div class="card-title"><span class="icon">🗺️</span> 슬롯 배치 맵 (Slot Map: 1~${totalSlots})</div>
          <div style="padding:20px;overflow-x:auto">
            <table class="result-table" style="min-width:100%">
              <thead><tr><th>슬롯 #</th><th>상 (Phase)</th><th>코일 그룹</th></tr></thead>
              <tbody>`;

      for (let s = 1; s <= totalSlots; s++) {
        const phase = slotMap[s];
        const cls = phase === 'U' ? 'u' : phase === 'V' ? 'v' : 'w';
        const color = phase === 'U' ? 'var(--phase-u)' : phase === 'V' ? 'var(--phase-v)' : 'var(--phase-w)';
        // 코일 그룹 번호 계산
        const groupIdx = phaseSlots[phase].findIndex(pair => pair.includes(s));
        html += `
                <tr>
                  <td style="font-weight:700">${s}</td>
                  <td><span class="badge badge-${cls}">Phase ${phase}</span></td>
                  <td style="color:${color}">#${groupIdx + 1}</td>
                </tr>`;
      }

      html += `
              </tbody>
            </table>
          </div>
        </section>`;

      return html;
    }

    /**
     * =====================================================
     * drawStator(totalSlots, slotMap, phaseSlots, poles)
     * =====================================================
     * 스태터 단면도 + 코일 배선 곡선 + 델타 결선 단자를 그립니다.
     */
    function drawStator(totalSlots, slotMap, phaseSlots, poles) {
      const ns = 'http://www.w3.org/2000/svg';
      const svgW = 700, svgH = 780;        // 단자 공간 포함
      const cx = 350, cy = 430;            // 스태터 원 중심 (아래로 이동)
      const outerR = 250, innerR = 130, slotR = 210;
      const slotW = 24, slotH = 52, labelR = 272;
      const angleStep = (2 * Math.PI) / totalSlots;
      const startAngle = -Math.PI / 2;

      // 상별 색상 설정
      const phaseColors = { U: '#FF0000', V: '#0000FF', W: '#00FF00' };
      const phaseSlotFill = { U: '#cc3333', V: '#3355cc', W: '#33aa44' };

      // SVG 생성
      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('id', 'statorSvg');
      svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
      svg.setAttribute('width', svgW);
      svg.setAttribute('height', svgH);

      // --- 외곽 원 ---
      const oc = document.createElementNS(ns, 'circle');
      oc.setAttribute('cx', cx); oc.setAttribute('cy', cy);
      oc.setAttribute('r', outerR); oc.setAttribute('class', 'stator-body');
      svg.appendChild(oc);

      // --- 보어 원 ---
      const ic = document.createElementNS(ns, 'circle');
      ic.setAttribute('cx', cx); ic.setAttribute('cy', cy);
      ic.setAttribute('r', innerR); ic.setAttribute('class', 'stator-bore');
      svg.appendChild(ic);

      // --- 슬롯 좌표 저장용 배열 ---
      const slotInner = [];  // 각 슬롯의 안쪽(보어 방향) 끝 좌표
      const slotOuter = [];  // 각 슬롯의 바깥쪽 끝 좌표

      // --- 권선 방향 맵 생성 ---
      // 각 코일 쌍에서 첫 번째 슬롯 = ⊙(Go: 전류 진출),
      //                     두 번째 슬롯 = ⊗(Return: 전류 진입)
      // 이는 코일이 슬롯1에서 나와(⊙) 슬롯2로 들어가는(⊗) 구조를 표현.
      const windingDir = {};  // { slotNum: 'go' | 'return' }
      ['U', 'V', 'W'].forEach(phase => {
        if(phaseSlots[phase]) {
          phaseSlots[phase].forEach(pair => {
            windingDir[pair[0]] = 'go';      // ⊙ 진출 (전류가 나옴)
            windingDir[pair[1]] = 'return';  // ⊗ 진입 (전류가 들어감)
          });
        }
      });

      // --- 슬롯 배치 + 착색 + 방향 표식 ---
      for (let i = 0; i < totalSlots; i++) {
        const num = i + 1;
        const angle = startAngle + i * angleStep;
        const sx = cx + slotR * Math.cos(angle);
        const sy = cy + slotR * Math.sin(angle);
        const rotDeg = (angle * 180 / Math.PI) + 90;

        // 슬롯 안쪽/바깥쪽 끝점 계산
        const inR = slotR - slotH / 2;
        const outR = slotR + slotH / 2;
        slotInner[num] = { x: cx + inR * Math.cos(angle), y: cy + inR * Math.sin(angle) };
        slotOuter[num] = { x: cx + outR * Math.cos(angle), y: cy + outR * Math.sin(angle) };

        const g = document.createElementNS(ns, 'g');
        g.setAttribute('transform', `translate(${sx},${sy}) rotate(${rotDeg})`);

        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('id', `slot-${num}`);
        rect.setAttribute('x', -slotW / 2); rect.setAttribute('y', -slotH / 2);
        rect.setAttribute('width', slotW); rect.setAttribute('height', slotH);
        rect.setAttribute('rx', 4); rect.setAttribute('class', 'slot-rect');

        // 상별 착색
        const phase = slotMap[num];
        if (phase) rect.setAttribute('fill', phaseSlotFill[phase]);
        g.appendChild(rect);

        // --- 권선 방향 화살표 (Go=외향 ↑, Return=내향 ↓) ---
        // Go: 전류가 나가는 방향 → 화살표가 외경(바깥) 방향
        // Return: 전류가 들어오는 방향 → 화살표가 내경(중앙) 방향
        // 슬롯 로컬 좌표에서 Y축은 반지름 방향 (위=바깥, 아래=안쪽)
        const dir = windingDir[num];
        const arrowColor = phase ? phaseColors[phase] : '#fff';
        if (dir) {
          const arrowG = document.createElementNS(ns, 'g');
          arrowG.setAttribute('pointer-events', 'none');
          // Go=외향(Y-): 화살표 ↑, Return=내향(Y+): 화살표 ↓
          const yDir = dir === 'go' ? -1 : 1;
          // 화살표 몸통 (선)
          const stem = document.createElementNS(ns, 'line');
          stem.setAttribute('x1', 0); stem.setAttribute('y1', 10 * yDir);
          stem.setAttribute('x2', 0); stem.setAttribute('y2', -10 * yDir);
          stem.setAttribute('stroke', arrowColor);
          stem.setAttribute('stroke-width', '2.5');
          stem.setAttribute('stroke-linecap', 'round');
          arrowG.appendChild(stem);
          // 화살표 머리 (삼각형)
          const head = document.createElementNS(ns, 'path');
          const tipY = -12 * yDir;
          const baseY = -4 * yDir;
          head.setAttribute('d', `M 0 ${tipY} L -5 ${baseY} L 5 ${baseY} Z`);
          head.setAttribute('fill', arrowColor);
          arrowG.appendChild(head);
          g.appendChild(arrowG);
        }

        svg.appendChild(g);

        // 슬롯 번호
        const lx = cx + labelR * Math.cos(angle);
        const ly = cy + labelR * Math.sin(angle);
        const lbl = document.createElementNS(ns, 'text');
        lbl.setAttribute('x', lx); lbl.setAttribute('y', ly);
        lbl.setAttribute('class', 'slot-label');
        lbl.textContent = num;
        svg.appendChild(lbl);
      }

      // --- 중심 텍스트 ---
      const ct = document.createElementNS(ns, 'text');
      ct.setAttribute('x', cx); ct.setAttribute('y', cy);
      ct.setAttribute('text-anchor', 'middle');
      ct.setAttribute('dominant-baseline', 'central');
      ct.setAttribute('fill', '#5a6f8a'); ct.setAttribute('font-size', '14');
      ct.textContent = `${poles || '?'}P / ${totalSlots}S`;
      svg.appendChild(ct);

      // ================================================================
      // Phase 3 개선: 깔끔한 코일 배선 + 방향 화살표 + 델타 결선
      // ================================================================

      // --- SVG 화살표 마커 정의 부분 삭제됨 ---


      // --- 헬퍼: 애니메이션이 적용된 path 생성 ---
      let animDelay = 0;
      function makeWire(d, cls, extraCls, len) {
        const p = document.createElementNS(ns, 'path');
        p.setAttribute('d', d);
        p.setAttribute('class', cls + (extraCls ? ' ' + extraCls : ''));
        p.style.strokeDasharray = len;
        p.style.strokeDashoffset = len;
        p.style.setProperty('--dash-len', len);
        p.classList.add('animated-wire');
        p.style.animationDelay = `${animDelay}s`;
        animDelay += 0.03;
        return p;
      }

      // --- 슬롯 각도 조회 헬퍼 ---
      function slotAngle(slotNum) {
        return startAngle + (slotNum - 1) * angleStep;
      }

      // ===== (A) 코일 루프 (내측 다이아몬드 패턴) =====
      // 슬롯 쌍을 각진 사선(LineTo)으로 연결하여 내측 보어를 지나는 다이아몬드 패턴 형성.
      // 짧은 다이아몬드(코일 내부)
      const coilGroup = document.createElementNS(ns, 'g');
      coilGroup.setAttribute('id', 'coilArcs');

      const coilLayerR = { U: innerR - 15, V: innerR - 35, W: innerR - 55 };

      ['U', 'V', 'W'].forEach(phase => {
        const cls = `wire-${phase.toLowerCase()}`;
        const pairs = phaseSlots[phase];
        if (!pairs) return;

        pairs.forEach(pair => {
          const s1 = pair[0], s2 = pair[1];
          const p1 = slotInner[s1], p2 = slotInner[s2];

          // 제어점(apex): 두 슬롯 중간 각도, 내경 안쪽 방향
          const midAng = slotAngle(s1) + angleStep / 2;
          const cr = coilLayerR[phase];
          const apexX = cx + cr * Math.cos(midAng);
          const apexY = cy + cr * Math.sin(midAng);

          // 부드러운 곡선(Bezier Curve): 시작 → 제어점(apex) → 끝
          const d = `M ${p1.x.toFixed(1)} ${p1.y.toFixed(1)} Q ${apexX.toFixed(1)} ${apexY.toFixed(1)} ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
          const wire = makeWire(d, cls, 'coil-arc', 120);
          coilGroup.appendChild(wire);
        });
      });
      svg.appendChild(coilGroup);

      // ===== (B) 점퍼 와이어 (직렬 연결, 외측 다이아몬드 패턴) =====
      // 코일 간 직렬 연결을 외측 방향 각진 사선으로 표현.
      // 긴 다이아몬드(외부 연결)
      const connectGroup = document.createElementNS(ns, 'g');
      connectGroup.setAttribute('id', 'jumperWires');

      const jumperLayerR = { U: outerR + 50, V: outerR + 65, W: outerR + 80 };

      ['U', 'V', 'W'].forEach(phase => {
        const cls = `wire-${phase.toLowerCase()}`;
        const pairs = phaseSlots[phase];
        if (!pairs) return;

        for (let idx = 0; idx < pairs.length - 1; idx++) {
          const fromSlot = pairs[idx][1];      // 현재 코일 끝 슬롯 (Return)
          const toSlot = pairs[idx + 1][0];    // 다음 코일 시작 슬롯 (Go)
          const from = slotOuter[fromSlot];
          const to = slotOuter[toSlot];

          const ang1 = slotAngle(fromSlot);
          const ang2 = slotAngle(toSlot);
          const midAng = (ang1 + ang2) / 2;
          const cr = jumperLayerR[phase];

          // 각진 꺾임점 (외측 방향)
          const apexX = cx + cr * Math.cos(midAng);
          const apexY = cy + cr * Math.sin(midAng);

          const d = `M ${from.x.toFixed(1)} ${from.y.toFixed(1)} L ${apexX.toFixed(1)} ${apexY.toFixed(1)} L ${to.x.toFixed(1)} ${to.y.toFixed(1)}`;
          const wire = makeWire(d, cls, 'jumper-wire', 400);
          connectGroup.appendChild(wire);
        }
      });
      svg.appendChild(connectGroup);

      // ===== (C) 델타 결선 단자 =====
      // 배선 데이터가 있는 경우에만 단자를 그림
      const hasWiring = phaseSlots['U'] && phaseSlots['U'].length > 0;
      if (hasWiring) {
        const termGroup = document.createElementNS(ns, 'g');
        termGroup.setAttribute('id', 'deltaTerminals');

        const terminals = [
          { name: 'U', x: 200, y: 55, color: '#FF3333' },
          { name: 'V', x: 350, y: 55, color: '#4488FF' },
          { name: 'W', x: 500, y: 55, color: '#33DD55' }
        ];

        // 단자 원 + 라벨
        terminals.forEach(t => {
          const c = document.createElementNS(ns, 'circle');
          c.setAttribute('cx', t.x); c.setAttribute('cy', t.y);
          c.setAttribute('r', 24);
          c.setAttribute('fill', t.color); c.setAttribute('fill-opacity', '0.15');
          c.setAttribute('stroke', t.color); c.setAttribute('class', 'terminal-node');
          termGroup.appendChild(c);

          const l = document.createElementNS(ns, 'text');
          l.setAttribute('x', t.x); l.setAttribute('y', t.y);
          l.setAttribute('class', 'terminal-label'); l.setAttribute('fill', t.color);
          l.textContent = t.name;
          termGroup.appendChild(l);
        });

        // 델타 삼각형 (U-V-W)
        const triPath = document.createElementNS(ns, 'polygon');
        triPath.setAttribute('points', terminals.map(t => `${t.x},${t.y + 24}`).join(' '));
        triPath.setAttribute('fill', 'none'); triPath.setAttribute('stroke', '#5a6f8a');
        triPath.setAttribute('stroke-width', '1'); triPath.setAttribute('stroke-dasharray', '5 4');
        triPath.setAttribute('opacity', '0.4');
        termGroup.appendChild(triPath);

        // 단자 → 스태터 연결 (Start=실선, End=점선, 라벨 없음)
        const deltaMap = [
          { phase: 'U', startTerm: 0, endTerm: 1 },
          { phase: 'V', startTerm: 1, endTerm: 2 },
          { phase: 'W', startTerm: 2, endTerm: 0 }
        ];

        deltaMap.forEach(dm => {
          const pairs = phaseSlots[dm.phase];
          if(!pairs || pairs.length === 0) return;
          const firstSlot = pairs[0][0];
          const lastSlot = pairs[pairs.length - 1][1];
          const sPt = slotOuter[firstSlot];
          const ePt = slotOuter[lastSlot];

          // Start 연결 (단자 → 첫 슬롯) — 실선
          const st = terminals[dm.startTerm];
          const sMidY = st.y + 24 + (sPt.y - st.y - 24) * 0.35;
          const sD = `M ${st.x} ${st.y + 24} C ${st.x} ${sMidY} ${sPt.x} ${sMidY} ${sPt.x} ${sPt.y}`;
          const sWire = makeWire(sD, `wire-${dm.phase.toLowerCase()}`, 'delta-line', 450);
          sWire.setAttribute('opacity', '0.7');
          termGroup.appendChild(sWire);

          // End 연결 (마지막 슬롯 → 다음 단자) — 점선
          const et = terminals[dm.endTerm];
          const eMidY = et.y + 24 + (ePt.y - et.y - 24) * 0.35;
          const eD = `M ${ePt.x} ${ePt.y} C ${ePt.x} ${eMidY} ${et.x} ${eMidY} ${et.x} ${et.y + 24}`;
          const eWire = makeWire(eD, `wire-${dm.phase.toLowerCase()}`, 'delta-line', 450);
          eWire.setAttribute('opacity', '0.5');
          eWire.setAttribute('stroke-dasharray', '8 4');
          termGroup.appendChild(eWire);
        });

        svg.appendChild(termGroup);
      }

      // --- 다이어그램 카드 조립 ---
      const diagramArea = document.getElementById('diagramArea');
      diagramArea.innerHTML = `
        <section class="card" style="animation-delay:0.4s">
          <div class="card-title">
            <span class="icon">🔧</span>
            고정자 결선도 (Stator Winding Diagram)
          </div>
          <div class="svg-wrap" id="svgContainer"></div>
          <div class="legend-wrap">
            <div class="legend-item">
              <div class="legend-swatch" style="background:#FF3333"></div>
              Phase U
            </div>
            <div class="legend-item">
              <div class="legend-swatch" style="background:#4488FF"></div>
              Phase V
            </div>
            <div class="legend-item">
              <div class="legend-swatch" style="background:#33DD55"></div>
              Phase W
            </div>
            <div class="legend-item" style="gap:4px">
              <span style="font-size:1rem;color:#fff">↑</span>
              Go (외향 — 전류 진출)
            </div>
            <div class="legend-item" style="gap:4px">
              <span style="font-size:1rem;color:#fff">↓</span>
              Return (내향 — 전류 진입)
            </div>
            <div class="legend-item">
              <div class="legend-swatch" style="background:transparent;border:1.5px dashed #8a9bb5"></div>
              점퍼 와이어 (직렬)
            </div>
          </div>
        </section>`;

      document.getElementById('svgContainer').appendChild(svg);
      diagramArea.classList.remove('hidden');
    }
    /**
     * =====================================================
     * drawDeltaSchematic(phaseSlots)
     * =====================================================
     * 정삼각형 형태의 델타(Δ) 결선 회로도를 SVG로 그립니다.
     *
     * [델타 결선 원리]
     * - U단자: Phase U의 Start + Phase W의 End
     * - V단자: Phase V의 Start + Phase U의 End
     * - W단자: Phase W의 Start + Phase V의 End
     * - 각 변(U→V, V→W, W→U)에 코일(인덕터) 기호를 배치
     */
    function drawDeltaSchematic(phaseSlots) {
      const ns = 'http://www.w3.org/2000/svg';
      const W = 500, H = 460;

      // 정삼각형 꼭짓점 (상단 중앙, 좌하, 우하)
      const triCx = W / 2, triCy = H / 2 + 10;
      const triR = 160;  // 삼각형 외접원 반지름
      // 꼭짓점: U(상단), W(좌하), V(우하)
      // 델타에서는 U-V 변 = Phase U, V-W 변 = Phase V, W-U 변 = Phase W
      const nodes = {
        U: { x: triCx, y: triCy - triR, color: '#FF3333' },
        V: { x: triCx + triR * Math.cos(-Math.PI/6), y: triCy + triR * Math.sin(-Math.PI/6) * -1 + triR, color: '#4488FF' },
        W: { x: triCx - triR * Math.cos(-Math.PI/6), y: triCy + triR * Math.sin(-Math.PI/6) * -1 + triR, color: '#33DD55' }
      };
      // 좌표 보정 — 깔끔한 정삼각형
      const h = triR * 1.5;
      nodes.U = { x: triCx, y: 70, color: '#FF3333' };
      nodes.V = { x: triCx + h * 0.87, y: 70 + h * 1.5, color: '#4488FF' };
      nodes.W = { x: triCx - h * 0.87, y: 70 + h * 1.5, color: '#33DD55' };

      const svg = document.createElementNS(ns, 'svg');
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
      svg.setAttribute('width', W); svg.setAttribute('height', H);
      svg.style.maxWidth = '100%'; svg.style.height = 'auto';

      // --- 헬퍼: 인덕터(코일) 기호 path 생성 ---
      // from→to 직선 위에 사인파 형태의 코일 기호를 그림
      function coilPath(x1, y1, x2, y2, nLoops) {
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx*dx + dy*dy);
        const ux = dx/len, uy = dy/len;       // 단위 벡터 (방향)
        const nx = -uy, ny = ux;               // 법선 벡터 (수직)

        // 코일은 전체 길이의 중간 60%를 차지
        const coilStart = 0.2, coilEnd = 0.8;
        const coilLen = (coilEnd - coilStart) * len;
        const loopW = coilLen / nLoops;
        const amp = 10;  // 코일 진폭

        // 시작 직선
        const sx = x1 + ux * len * coilStart;
        const sy = y1 + uy * len * coilStart;
        let d = `M ${x1.toFixed(1)} ${y1.toFixed(1)} L ${sx.toFixed(1)} ${sy.toFixed(1)}`;

        // 반원 코일 루프
        for (let i = 0; i < nLoops; i++) {
          const cx1 = sx + ux * (i * loopW + loopW * 0.25) + nx * amp;
          const cy1 = sy + uy * (i * loopW + loopW * 0.25) + ny * amp;
          const ex = sx + ux * (i * loopW + loopW * 0.5);
          const ey = sy + uy * (i * loopW + loopW * 0.5);
          const cx2 = sx + ux * (i * loopW + loopW * 0.75) - nx * amp;
          const cy2 = sy + uy * (i * loopW + loopW * 0.75) - ny * amp;
          const endX = sx + ux * ((i + 1) * loopW);
          const endY = sy + uy * ((i + 1) * loopW);
          d += ` Q ${cx1.toFixed(1)} ${cy1.toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}`;
          d += ` Q ${cx2.toFixed(1)} ${cy2.toFixed(1)} ${endX.toFixed(1)} ${endY.toFixed(1)}`;
        }

        // 끝 직선
        d += ` L ${x2.toFixed(1)} ${y2.toFixed(1)}`;
        return d;
      }

      // --- 삼각형 각 변 = 각 상의 코일 ---
      // 델타 결선 배치:
      //   U → V 변: Phase U (Start U → End U)
      //   V → W 변: Phase V (Start V → End V)
      //   W → U 변: Phase W (Start W → End W)
      const sides = [
        { from: 'U', to: 'V', phase: 'U', color: '#FF3333' },
        { from: 'V', to: 'W', phase: 'V', color: '#4488FF' },
        { from: 'W', to: 'U', phase: 'W', color: '#33DD55' }
      ];

      sides.forEach(side => {
        const f = nodes[side.from], t = nodes[side.to];
        const d = coilPath(f.x, f.y, t.x, t.y, 4);
        const path = document.createElementNS(ns, 'path');
        path.setAttribute('d', d);
        path.setAttribute('stroke', side.color);
        path.setAttribute('stroke-width', '2.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-linecap', 'round');
        svg.appendChild(path);

        // 슬롯 번호 표기
        const mx = (f.x + t.x) / 2, my = (f.y + t.y) / 2;
        const dx = t.x - f.x, dy = t.y - f.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        const offX = -(dy/len) * 22, offY = (dx/len) * 22;

        const pairs = phaseSlots[side.phase];
        const slotText = pairs.map(p => p.join('-')).join(', ');
        const slotLabel = document.createElementNS(ns, 'text');
        slotLabel.setAttribute('x', mx + offX);
        slotLabel.setAttribute('y', my + offY);
        slotLabel.setAttribute('text-anchor', 'middle');
        slotLabel.setAttribute('dominant-baseline', 'central');
        slotLabel.setAttribute('fill', side.color);
        slotLabel.setAttribute('font-size', '10');
        slotLabel.setAttribute('font-weight', '700');
        slotLabel.setAttribute('opacity', '0.9');
        slotLabel.setAttribute('font-family', 'var(--font)');
        slotLabel.textContent = slotText;
        svg.appendChild(slotLabel);

        // 방향 화살표 (변의 40% 지점)
        const aPt = 0.4;
        const ax = f.x + (t.x - f.x) * aPt;
        const ay = f.y + (t.y - f.y) * aPt;
        const angle = Math.atan2(t.y - f.y, t.x - f.x) * 180 / Math.PI;
        const arrowG = document.createElementNS(ns, 'g');
        arrowG.setAttribute('transform', `translate(${ax},${ay}) rotate(${angle})`);
        const arrowPath = document.createElementNS(ns, 'path');
        arrowPath.setAttribute('d', 'M -6 -4 L 2 0 L -6 4');
        arrowPath.setAttribute('stroke', side.color);
        arrowPath.setAttribute('stroke-width', '2');
        arrowPath.setAttribute('fill', 'none');
        arrowPath.setAttribute('stroke-linecap', 'round');
        arrowG.appendChild(arrowPath);
        svg.appendChild(arrowG);
      });

      // --- 꼭짓점 단자 노드 ---
      // 각 꼭짓점에서 만나는 상:
      //   U: Phase U Start + Phase W End
      //   V: Phase V Start + Phase U End
      //   W: Phase W Start + Phase V End
      const nodeInfo = {
        U: 'Start U / End W',
        V: 'Start V / End U',
        W: 'Start W / End V'
      };

      ['U', 'V', 'W'].forEach(name => {
        const n = nodes[name];
        // 원
        const c = document.createElementNS(ns, 'circle');
        c.setAttribute('cx', n.x); c.setAttribute('cy', n.y);
        c.setAttribute('r', 22);
        c.setAttribute('fill', n.color); c.setAttribute('fill-opacity', '0.15');
        c.setAttribute('stroke', n.color); c.setAttribute('stroke-width', '2.5');
        svg.appendChild(c);

        // 단자명
        const t = document.createElementNS(ns, 'text');
        t.setAttribute('x', n.x); t.setAttribute('y', n.y);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('dominant-baseline', 'central');
        t.setAttribute('fill', n.color);
        t.setAttribute('font-size', '16'); t.setAttribute('font-weight', '800');
        t.setAttribute('font-family', 'var(--font)');
        t.textContent = name;
        svg.appendChild(t);
      });

      // --- 타이틀 ---
      const title = document.createElementNS(ns, 'text');
      title.setAttribute('x', W / 2); title.setAttribute('y', 28);
      title.setAttribute('text-anchor', 'middle');
      title.setAttribute('fill', '#5a6f8a');
      title.setAttribute('font-size', '12');
      title.setAttribute('font-family', 'var(--font)');
      title.textContent = 'Delta (Δ) Connection Schematic';
      svg.appendChild(title);

      // --- 카드에 조립 ---
      const area = document.getElementById('deltaSchematicArea');
      area.innerHTML = `
        <section class="card" style="animation-delay:0.5s">
          <div class="card-title">
            <span class="icon">⚡</span>
            델타(Δ) 결선 도식 (Delta Connection Schematic)
          </div>
          <div class="svg-wrap" id="deltaContainer"></div>
        </section>`;
      document.getElementById('deltaContainer').appendChild(svg);
      area.classList.remove('hidden');
    }
  </script>
</body>
</html>
